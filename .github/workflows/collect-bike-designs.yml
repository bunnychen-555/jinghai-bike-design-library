name: Collect bicycle design references

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * 1,4"

permissions:
  contents: write

concurrency:
  group: bicycle-design-crawler
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect licensed references
        run: python crawler/collect_bikes.py

      - name: Save candidate list
        run: |
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "No new candidates"
            exit 0
          fi
          git config user.name "jinghai-bike-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/candidates.json data/candidates.csv
          git commit -m "chore: update bicycle design candidates"
          git push
